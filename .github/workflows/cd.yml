# ─────────────────────────────────────────────────────────────────────────────
#  CD Pipeline — api-monitor
#  Runs on: push to main ONLY
#  Prepares production artifacts. Replace the placeholder step with your 
#  preferred deployment target (e.g., Docker, AWS, GitHub Pages, etc.)
# ─────────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: [main]
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Ensure only one deployment runs at a time
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-prepare:
    name: 🏗️ Build Production Artifact
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js project
        run: bun run build
        env:
          NEXT_PUBLIC_APP_NAME: "Neural Architect"

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            app/.next/
            app/public/
            app/package.json
            app/bun.lock
          retention-days: 14

  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build-and-prepare]
    
    steps:
      - name: Download Production Artifacts
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: app

      - name: Deployment Placeholder
        run: |
          echo "✅ Production artifacts successfully built and downloaded."
          echo "ℹ️  Add your deployment steps here (e.g., rsync to a VPS, build and push a Docker image, or deploy to a cloud provider)."
