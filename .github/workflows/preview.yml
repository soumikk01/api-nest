#  Preview Pipeline â€” api-monitor
#  Runs on: every PR â†’ deploys a preview URL (not production)
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

name: Preview

on:
  pull_request:
    branches: [main, develop]

jobs:
  preview:
    name: 🔮 Deploy Preview
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.x"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: app/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets['VERCEL_TOKEN'] }}
        env:
          VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] }}

      - name: Build preview artifacts
        run: vercel build --token=${{ secrets['VERCEL_TOKEN'] }}
        env:
          VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] }}

      - name: Deploy preview
        id: preview
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets['VERCEL_TOKEN'] }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets['VERCEL_ORG_ID'] }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID'] }}

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const pr = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: [
                '## Preview Deployment Ready',
                '',
                `| Field | Value |`,
                `|---|---|`,
                `| **URL** | [${url}](${url}) |`,
                `| **Commit** | \`${sha}\` |`,
                `| **Branch** | \`${{ github.head_ref }}\` |`,
              ].join('\n')
            });
