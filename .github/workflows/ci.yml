# ─────────────────────────────────────────────────────────────────────────────
#  CI Pipeline — api-monitor
#  Runs on: every push + every pull-request targeting main/develop
#  Jobs: lint → typecheck → build  (lint & typecheck run in parallel)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BUN_VERSION: "1.x"
  # Suppress Next.js telemetry in CI
  NEXT_TELEMETRY_DISABLED: "1"
  # Suppress Turborepo telemetry in CI
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # FIX: cache ALL workspace node_modules, not just root
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  # ── 2. TypeScript Check ─────────────────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # FIX: typecheck depends on ^build in turbo.json, so shared packages
      # must be built first (they are TypeScript source, not compiled).
      # We skip the backend build (it needs Prisma/DB) and only check
      # the packages that have a typecheck script.
      - name: TypeScript type check
        run: bun run typecheck

  # ── 3. Build ─────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # FIX: only build the Next.js frontend apps (web, auth, docs, admin).
      # The backend build requires Prisma/DB secrets — excluded from CI build.
      - name: Build frontend apps
        # --concurrency=1 builds apps sequentially to avoid OOM on 2-core runners
        run: bunx turbo run build --filter=@api-monitor/web --filter=@api-monitor/auth --filter=@api-monitor/docs --filter=@api-monitor/admin --concurrency=1
        env:
          NEXT_PUBLIC_APP_NAME: "Apio"
          NEXT_PUBLIC_API_URL: "https://api.example.com/api/v1"
          NEXT_PUBLIC_AUTH_URL: "https://auth.example.com"
          NEXT_PUBLIC_DOCS_URL: "https://docs.example.com"

      # FIX: Next.js outputs to .next/, not dist/. Upload the correct paths.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next/
            apps/auth/.next/
            apps/docs/.next/
            apps/admin/.next/
          retention-days: 7
          if-no-files-found: warn
