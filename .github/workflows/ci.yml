# ─────────────────────────────────────────────────────────────────────────────
#  CI Pipeline — Apio API Monitor
#
#  Triggers : every push + PR to main / develop
#
#  Job graph (parallel where possible):
#
#    ┌──────────┐  ┌────────────┐  ┌──────────────┐  ┌───────────────┐
#    │   lint   │  │ typecheck  │  │ unit-tests   │  │ security-scan │
#    └────┬─────┘  └─────┬──────┘  └──────┬───────┘  └───────┬───────┘
#         │              │                │                   │
#         └──────────────┴────────────────┴───────────────────┘
#                                  │
#                          ┌───────▼────────┐
#                          │  build-check   │  (frontend build)
#                          └───────┬────────┘
#                                  │
#                          ┌───────▼────────┐
#                          │  docker-build  │  (backend Dockerfile validation)
#                          └────────────────┘
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs on the same branch/PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.x"
  NODE_VERSION: "20"
  NEXT_TELEMETRY_DISABLED: "1"
  TURBO_TELEMETRY_DISABLED: "1"
  FORCE_COLOR: "1"

# ─────────────────────────────────────────────────────────────────────────────
#  Reusable setup composite — DRY: avoids repeating checkout + bun + cache
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git-based lint-staged in future

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  # ── 2. TypeScript Type Check ──────────────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gitleaks needs full history to diff PR commits

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check (all apps)
        run: bun run typecheck

  # ── 3. Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gitleaks needs full history to diff PR commits

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/backend
        run: bunx prisma generate
        env:
          DATABASE_URL: "mongodb://localhost:27017/apio_test"

      - name: Run backend unit tests (Jest)
        working-directory: apps/backend
        run: bun run test --passWithNoTests --coverage --coverageReporters=text-summary
        env:
          # Provide dummy values so the NestJS app can bootstrap in test mode
          DATABASE_URL: "mongodb://localhost:27017/apio_test"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "ci_test_secret_not_real"
          JWT_REFRESH_SECRET: "ci_test_refresh_secret_not_real"
          NODE_ENV: "test"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/backend/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── 4. Security Scanning ──────────────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Don't block PRs from forks — they can't access secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write   # needed to upload SARIF results
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gitleaks needs full history to diff PR commits

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 4a. npm audit (dependency vulnerability check) ───────────────────────
      - name: Dependency vulnerability audit
        run: |
          echo "── Backend audit ──────────────────────────────"
          cd apps/backend && bun audit --audit-level=high || true
          echo "── Web audit ──────────────────────────────────"
          cd ../web && bun audit --audit-level=high || true
        continue-on-error: false

      # ── 4b. Trivy — filesystem scan (secrets + CVEs) ─────────────────────────
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          # Ignore .env files (they're gitignored, but just in case)
          skip-dirs: "node_modules,.next,.turbo,dist"
          exit-code: "0"   # don't fail the job on first run — review findings

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      # ── 4c. Secret scanning — detect accidental credential commits ────────────
      - name: Detect hard-coded secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional: for org reporting
        continue-on-error: true   # report findings but don't block PRs until baseline established

  # ── 5. Frontend Build Check ───────────────────────────────────────────────────
  build-check:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gitleaks needs full history to diff PR commits

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache Turbo build
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build all frontend apps (backend excluded — needs DB/Prisma)
      # --concurrency=1 avoids OOM on 2-core GitHub runners
      - name: Build frontend apps
        run: |
          bunx turbo run build \
            --filter=@api-monitor/web \
            --filter=@api-monitor/auth \
            --concurrency=1
        env:
          NEXT_PUBLIC_APP_NAME: "Apio"
          NEXT_PUBLIC_API_URL: "https://api.apio.one/api/v1"
          NEXT_PUBLIC_WS_URL: "https://api.apio.one"
          NEXT_PUBLIC_AUTH_URL: "https://auth.apio.one"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: |
            apps/web/.next/
            apps/auth/.next/
          retention-days: 3
          if-no-files-found: warn

  # ── 6. Docker Build Validation ────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck, unit-tests]

    steps:
      - uses: actions/checkout@v4

      # Set up QEMU for multi-platform emulation (linux/amd64 + linux/arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # BuildKit unlocks: layer cache, parallel stages, faster builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6a. Lint the Dockerfile before building ───────────────────────────────
      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/backend/Dockerfile
          failure-threshold: warning
          format: tty

      # ── 6b. Build image (no push) — validates the Dockerfile is correct ────────
      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          platforms: linux/amd64
          push: false
          load: false      # image stays in BuildKit cache only (no daemon load needed)
          # Cache layers in GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha,scope=backend-docker
          cache-to:   type=gha,scope=backend-docker,mode=max
          # Tag with branch + SHA for traceability
          tags: |
            ghcr.io/${{ github.repository_owner }}/apio-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/apio-backend:ci

      # ── 6c. Trivy scan backend source (image not pushed so scan filesystem) ────
      # The full image scan is done after deployment; here we scan the source code.
      - name: Scan backend source for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "apps/backend"
          format: "table"
          severity: "CRITICAL,HIGH"
          skip-dirs: "node_modules,dist,.next"
          exit-code: "0"   # report only — don't block CI

  # ── 7. CI Status Gate ─────────────────────────────────────────────────────────
  #  Single job that required-status-checks can point to.
  #  Set this as the required check in branch protection rules.
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, security-scan, build-check, docker-build]
    if: always()

    steps:
      - name: Report job results
        run: |
          echo "## CI Job Results"
          echo "| Job | Result |"
          echo "|-----|--------|"
          echo "| lint          | ${{ needs.lint.result }} |"
          echo "| typecheck     | ${{ needs.typecheck.result }} |"
          echo "| unit-tests    | ${{ needs.unit-tests.result }} |"
          echo "| security-scan | ${{ needs.security-scan.result }} |"
          echo "| build-check   | ${{ needs.build-check.result }} |"
          echo "| docker-build  | ${{ needs.docker-build.result }} |"

      - name: Fail if any required job failed
        run: |
          FAILED=0
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.unit-tests.result }}" \
            "${{ needs.build-check.result }}" \
            "${{ needs.docker-build.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED=1
            fi
          done
          # security-scan is allowed to produce warnings — only hard failures block
          if [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "⚠️  security-scan failed — review findings in the Security tab"
          fi
          if [[ "$FAILED" == "1" ]]; then
            echo "❌ One or more required CI jobs failed — see table above"
            exit 1
          fi
          echo "✅ All required CI checks passed"
