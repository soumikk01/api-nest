# Dependabot — auto dependency update PRs
# Runs weekly on Mondays for both npm (Next.js app) and GitHub Actions

version: 2

updates:
  # Frontend (Next.js / Bun)
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch all Next.js-related updates into one PR
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      # Batch all dev tooling
      tooling:
        patterns:
          - "eslint*"
          - "typescript"
          - "sass"
          - "postcss*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "ci(deps)"
