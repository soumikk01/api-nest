# ─────────────────────────────────────────────────────────────────────────────
#  Dependabot — automatic dependency updates
#  Opens PRs weekly for: npm (all apps) + GitHub Actions
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ── Root workspace deps ──────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels: ["dependencies", "automated"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      dev-tools:
        patterns: ["eslint*", "prettier*", "typescript*", "@types/*"]
      turbo:
        patterns: ["turbo*"]

  # ── Backend deps ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels: ["dependencies", "backend", "automated"]
    commit-message:
      prefix: "chore(deps/backend)"
    groups:
      nestjs:
        patterns: ["@nestjs/*", "nestjs-*"]
      prisma:
        patterns: ["prisma", "@prisma/*"]

  # ── Web app deps ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels: ["dependencies", "frontend", "automated"]
    commit-message:
      prefix: "chore(deps/web)"
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      next:
        patterns: ["next", "eslint-config-next"]

  # ── Auth app deps ────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/auth"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels: ["dependencies", "auth", "automated"]
    commit-message:
      prefix: "chore(deps/auth)"

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels: ["dependencies", "ci", "automated"]
    commit-message:
      prefix: "chore(ci)"

  # ── Docker base images ───────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels: ["dependencies", "docker", "automated"]
    commit-message:
      prefix: "chore(docker)"
